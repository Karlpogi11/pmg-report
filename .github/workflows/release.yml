name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      NOTARY_KEYCHAIN_PROFILE: karlapp-notary
      SPARKLE_KEY_ACCOUNT: KarlApp.Report-Template

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag version
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(
            awk -F' = ' '/MARKETING_VERSION = / {
              gsub(/;|"/, "", $2);
              print $2;
              exit
            }' "Report Template/Report Template.xcodeproj/project.pbxproj"
          )"

          if [[ -z "$APP_VERSION" ]]; then
            echo "Could not read MARKETING_VERSION from project.pbxproj." >&2
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) must match MARKETING_VERSION ($APP_VERSION)." >&2
            exit 1
          fi

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Prepare signing and notarization
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_APP_IDENTITY: ${{ secrets.DEVELOPER_ID_APP_IDENTITY }}
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          missing=()
          required_vars=(
            MACOS_CERTIFICATE_P12_BASE64
            MACOS_CERTIFICATE_PASSWORD
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
            DEVELOPER_ID_APP_IDENTITY
            SPARKLE_PRIVATE_KEY_BASE64
          )
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              missing+=("$var_name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required repository secrets: ${missing[*]}" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          printf "%s" "$MACOS_CERTIFICATE_P12_BASE64" | openssl base64 -d -A > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials "$NOTARY_KEYCHAIN_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build release artifacts
        shell: bash
        env:
          PRODUCTION_RELEASE: "1"
          DEVELOPER_ID_APP_IDENTITY: ${{ secrets.DEVELOPER_ID_APP_IDENTITY }}
          NOTARY_KEYCHAIN_PROFILE: ${{ env.NOTARY_KEYCHAIN_PROFILE }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_KEY_ACCOUNT: ${{ env.SPARKLE_KEY_ACCOUNT }}
          SPARKLE_ALLOW_KEY_GENERATION: "0"
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
          COPY_APPCAST_TO_ROOT: "0"
          RELEASE_TAG: ${{ github.ref_name }}
          DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
        run: |
          set -euo pipefail
          bash ./scripts/release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ env.APP_VERSION }}
          body: |
            Install files:
            - Report-Template-${{ env.APP_VERSION }}.dmg (recommended: drag to Applications)
            - install.sh (optional terminal installer)

            Terminal install (latest):
            curl -fsSL https://raw.githubusercontent.com/Karlpogi11/pmg-report/main/install.sh | bash
            curl -fsSL https://raw.githubusercontent.com/Karlpogi11/pmg-report/main/install.sh | bash -s -- --yes
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/Report-Template-${{ env.APP_VERSION }}.dmg
            dist/appcast.xml
            install.sh

      - name: Cleanup signing keychain
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
